services:
  postgres:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_DB: psihointegritet
      POSTGRES_USER: psihointegritet
      POSTGRES_PASSWORD: local_only_change_me
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U psihointegritet -d psihointegritet"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8.8-alpine
    ports:
      - "6381:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    profiles: ["backend"]
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://psihointegritet:local_only_change_me@postgres:5432/psihointegritet
      MIGRATION_DATABASE_URL: postgresql+psycopg://psihointegritet:local_only_change_me@postgres:5432/psihointegritet
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: '["http://localhost:3007"]'
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
